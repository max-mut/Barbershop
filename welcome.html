<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="images/Sharpcuts.png">
    <title>Welcome to SharpCuts</title>
   
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/welcome.css">
</head>

<body>

<section class="welcome">

    <!-- LEFT — logo fills entire left side -->
    <div class="welcome-left">
        <img
            src="images/Sharpcuts.png"
            class="welcome-logo"
            alt="SharpCuts Logo">
    </div>

    <!-- RIGHT — text content -->
    <div class="welcome-right">
        <div class="welcome-content">

            <p class="welcome-tag">Welcome To SharpCuts</p>

            <h1 class="brand">
                <span class="brand-sharp">Sharp</span><span class="brand-cuts">Cuts</span>
            </h1>

            <p class="description">
                Premium barber services in the heart of Nairobi.
                Clean fades, classic cuts, beard grooming and
                professional service since 2018.
            </p>

            <div class="buttons">
                <a href="index.html" class="enter-btn">Enter Website</a>
                <a href="about.html" class="about-btn">Our Story</a>
            </div>

            <div class="stats">
                <div class="stat">
                    <h3>5</h3>
                    <p>Barbers</p>
                </div>
                <div class="stat">
                    <h3>1000+</h3>
                    <p>Clients</p>
                </div>
                <div class="stat">
                    <h3>2018</h3>
                    <p>Established</p>
                </div>
            </div>

        </div>
    </div>

</section>

<p class="welcome-footer">Kilimani, Nairobi &nbsp;|&nbsp; Est. 2018</p>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>

</body>
</html>
